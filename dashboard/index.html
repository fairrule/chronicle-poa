<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chronicle Proof of Asset — 대시보드</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #141922; --panel2: #1b212c; --line: #263041;
    --fg: #e6edf3; --muted: #8b98a9; --accent: #5b9dff; --accent2:#8b7bff;
    --a: #3fb950; --b: #d29922; --c: #f85149; --track:#222a36;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f5f7fa; --panel:#ffffff; --panel2:#f0f3f7; --line:#e2e8f0;
      --fg:#1a2332; --muted:#5a6b82; --accent:#2563eb; --accent2:#6d5bd0;
      --a:#1a7f37; --b:#9a6700; --c:#cf222e; --track:#e6ebf1;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    padding: 24px; max-width: 1180px; margin: 0 auto;
  }
  header { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom: 4px; }
  h1 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
  h1 .sub { color: var(--muted); font-weight: 400; font-size: 14px; }
  .gen { color: var(--muted); font-size: 12px; }
  .note { color: var(--muted); font-size: 12px; margin: 6px 0 18px; padding: 8px 12px; background: var(--panel2); border-left: 3px solid var(--accent2); border-radius: 4px; }
  .kpis { display:grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom: 20px; }
  .kpi { background: var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .kpi .v { font-size: 24px; font-weight: 650; letter-spacing:-0.02em; }
  .kpi .l { color: var(--muted); font-size: 12px; margin-top:2px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  @media (max-width: 820px){ .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin:0 0 14px; font-weight:600; }
  table { width:100%; border-collapse: collapse; font-size:13px; }
  th, td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--muted); font-weight:500; font-size:12px; }
  td.num, th.num { text-align:right; font-variant-numeric: tabular-nums; }
  .tablewrap { overflow-x:auto; }
  .badge { display:inline-block; min-width:18px; text-align:center; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:700; }
  .g-A{ background:color-mix(in srgb, var(--a) 20%, transparent); color:var(--a);}
  .g-B{ background:color-mix(in srgb, var(--b) 20%, transparent); color:var(--b);}
  .g-C{ background:color-mix(in srgb, var(--c) 22%, transparent); color:var(--c);}
  .fresh{ font-size:11px; color:var(--muted); }
  .bars { display:flex; flex-direction:column; gap:7px; margin-top:4px; }
  .bar { display:grid; grid-template-columns: 72px 1fr auto; align-items:center; gap:8px; font-size:12px; }
  .bar > span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bar .track { background:var(--track); border-radius:5px; height:14px; overflow:hidden; }
  .bar .fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:5px; }
  .bar .pct { text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; min-width:52px; }
  .flag { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; background:var(--panel2); margin-bottom:8px; font-size:13px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .ok { color:var(--a); }
  .muted { color:var(--muted); }
  .wam { font-size:28px; font-weight:650; letter-spacing:-0.02em; }
  .wam small { font-size:14px; color:var(--muted); font-weight:400; }
  .sect { margin-top:14px; }
  .sect .h { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .err { padding:16px; background:var(--panel); border:1px solid var(--c); border-radius:10px; color:var(--c); }
  .placeholder { color:var(--muted); font-size:13px; padding:8px 0; }
  code { background:var(--panel2); padding:1px 5px; border-radius:4px; font-size:12px; }
  .srclink { color:var(--accent); text-decoration:none; font-size:12px; word-break:break-all; }
  .srclink:hover { text-decoration:underline; }
  .srcgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; }
  .srccard { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:11px 13px; }
  .srccard .st { font-size:12px; font-weight:600; margin-bottom:5px; }
  .srccard .sd { font-size:12px; color:var(--fg); margin-bottom:3px; }
  .srccard .sm { font-size:11px; color:var(--muted); margin-top:3px; word-break:break-word; }
  .srccard .cav { color:var(--b); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .chip { background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:2px 10px; font-size:12px; font-variant-numeric:tabular-nums; }
  .sp-neg { color:var(--b); font-weight:600; }
  .sp-pos { color:var(--a); font-weight:600; }
  .sp-mid { color:var(--muted); font-weight:600; }
  .badge.man { background:color-mix(in srgb, var(--b) 18%, transparent); color:var(--b); font-size:10px; font-weight:600; margin-left:5px; }
</style>
</head>
<body>
  <header>
    <h1>Chronicle Proof of Asset <span class="sub">— 수집·분석 대시보드</span></h1>
    <div class="gen" id="gen"></div>
  </header>
  <div class="note" id="note"></div>
  <div class="kpis" id="kpis"></div>
  <div class="grid">
    <div class="panel" id="p-valuation"><h2>① 밸류에이션</h2><div class="body"></div></div>
    <div class="panel" id="p-risk"><h2>② 리스크 분해</h2><div class="body"></div></div>
    <div class="panel" id="p-integrity"><h2>③ 무결성 게이트</h2><div class="body"></div></div>
    <div class="panel" id="p-benchmark"><h2>④ 벤치마크</h2><div class="body"></div></div>
  </div>
  <div class="panel" id="p-track" style="margin-top:16px"><h2>실적 (Track Record)</h2><div class="body"></div></div>
  <div class="panel" id="p-reliability" style="margin-top:16px"><h2>오라클 신뢰도</h2><div class="body"></div></div>
  <div class="panel" id="p-sources" style="margin-top:16px"><h2>출처 (Provenance)</h2><div class="body"></div></div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const el = (t, cls, html) => { const e=document.createElement(t); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };
const fmtUsd = n => n==null ? "—" : "$" + Math.round(n).toLocaleString();
const fmtNav = n => n==null ? "—" : (n<10 ? n.toFixed(4) : n.toLocaleString(undefined,{maximumFractionDigits:2}));
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function main(){
  let d;
  try {
    const r = await fetch("./analysis.json", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    d = await r.json();
  } catch(e){
    document.body.innerHTML = '<div class="err">analysis.json을 불러오지 못했습니다 ('+esc(e.message)+').<br>이 페이지는 정적 서버로 열어야 하며, <code>data/analysis.json</code>이 이 폴더에 복사돼 있어야 합니다. (<code>npm run dashboard:build</code>)</div>';
    return;
  }
  $("#gen").textContent = "생성 " + new Date(d.generated_at).toLocaleString();
  $("#note").textContent = "⚠︎ " + (d.note || "");

  renderKpis(d);
  renderValuation(d);
  renderRisk(d);
  renderIntegrity(d);
  renderBenchmark(d);
  renderTrack(d);
  renderReliability(d);
  renderSources(d);
}

function renderTrack(d){
  const body = $("#p-track .body");
  const clsLabel = {treasury:"국채", clo:"CLO", credit:"크레딧", equity:"주식", unknown:"미확인"};
  // 티커 기준 dedupe (같은 펀드 이력 동일)
  const seen = new Set();
  const rows = (d.assets||[]).filter(a=>a.track_record).filter(a=>{ if(seen.has(a.ticker))return false; seen.add(a.ticker); return true; });
  if(!rows.length){ body.innerHTML='<div class="placeholder">이력 있는 자산이 없습니다. <code>npm run backfill</code>(Centrifuge) 또는 cron이 쌓입니다.</div>'; return; }
  let h = '<div class="tablewrap"><table><thead><tr>'+
    '<th>자산</th><th>자산군</th><th class="num">기간</th><th class="num">현재 yield</th><th class="num">실현 연율</th><th class="num">변동성</th><th class="num">최대낙폭</th></tr></thead><tbody>';
  for(const a of rows.sort((x,y)=>x.ticker.localeCompare(y.ticker))){
    const t=a.track_record;
    const realized=t.annualized_return_pct;
    const quoted=a.yield_7d;
    // yield vs 실현 괴리 강조: 실현이 quoted보다 크게 낮으면 경고색
    const gap = (realized!=null&&quoted!=null)?(realized-quoted):null;
    const rcls = gap==null?"":(gap < -1 ? "sp-neg" : (gap>1?"sp-pos":""));
    h += '<tr><td><b>'+esc(a.ticker)+'</b></td>'+
      '<td><span class="chip">'+esc(clsLabel[a.asset_class]||a.asset_class)+'</span></td>'+
      '<td class="num muted">'+t.n_obs+'일</td>'+
      '<td class="num muted">'+(quoted!=null?quoted.toFixed(2)+"%":"—")+'</td>'+
      '<td class="num '+rcls+'">'+(realized!=null?realized.toFixed(2)+"%":"—")+'</td>'+
      '<td class="num muted">'+(t.volatility_pct!=null?t.volatility_pct.toFixed(2)+"%":"—")+'</td>'+
      '<td class="num '+(t.max_drawdown_pct<-0.5?"sp-neg":"muted")+'">'+(t.max_drawdown_pct!=null?t.max_drawdown_pct.toFixed(2)+"%":"—")+'</td></tr>';
  }
  h += '</tbody></table></div>';
  h += '<div class="muted" style="margin-top:8px;font-size:12px">실현 연율 = 기간 NAV 상승의 연율화(실제 성과). <b>현재 yield보다 실현이 크게 낮으면</b>(빨강) 광고 수익과 실제의 괴리 — 점검 신호. 변동성·낙폭이 낮을수록 안정적. 이력: Centrifuge backfill(~300일), 나머지는 cron 누적.</div>';
  body.innerHTML = h;
}

function renderReliability(d){
  const body = $("#p-reliability .body");
  const rel = d.oracle_reliability || [];
  if(!rel.length){ body.innerHTML='<div class="placeholder">신뢰도 데이터 없음.</div>'; return; }
  const gcls = {high:"sp-pos", medium:"sp-mid", low:"sp-neg"};
  const glabel = {high:"높음", medium:"보통", low:"낮음"};
  let h = '<div class="tablewrap"><table><thead><tr>'+
    '<th>자산</th><th>체인</th><th class="num">점수</th><th>등급</th><th class="num">쿼럼</th><th>플래그</th></tr></thead><tbody>';
  for(const r of rel){
    const bar = '<div class="track" style="width:80px;display:inline-block;vertical-align:middle"><div class="fill" style="width:'+r.score+'%"></div></div>';
    h += '<tr><td><b>'+esc(r.ticker)+'</b></td><td class="muted">'+esc(r.chain)+'</td>'+
      '<td class="num">'+bar+' '+r.score+'</td>'+
      '<td class="'+(gcls[r.grade]||"")+'">'+esc(glabel[r.grade]||r.grade)+'</td>'+
      '<td class="num muted">'+(r.quorum!=null?(r.quorum+"/"+(r.validator_count??"?")):"—")+'</td>'+
      '<td class="fresh">'+((r.flags||[]).map(esc).join(" · ")||"—")+'</td></tr>';
  }
  h += '</tbody></table></div>';
  h += '<div class="muted" style="margin-top:8px;font-size:12px">신뢰도 = freshness·쿼럼(bar)·교차체인 일관성의 투명한 감점. 모든 피드가 <b>쿼럼 2</b>로 attestation이 약함(약점 노출). 가동률(uptime) 반영은 이력 축적(backfill) 후.</div>';
  body.innerHTML = h;
}

function renderSources(d){
  const body = $("#p-sources .body");
  const s = d.sources;
  if(!s){ body.innerHTML='<div class="placeholder">출처 정보 없음.</div>'; return; }
  const link = u => u ? '<a href="'+esc(u)+'" target="_blank" rel="noopener" class="srclink">'+esc(u)+' ↗</a>' : '';
  let h = '<div class="srcgrid">';
  // 온체인 read
  h += '<div class="srccard"><div class="st">온체인 NAV</div>'+
       '<div class="sd">'+esc(s.onchain_nav.method)+'</div>'+
       '<div class="sm">대상: '+esc(s.onchain_nav.target)+'</div>'+
       '<div class="sm">RPC: '+esc(s.onchain_nav.rpc)+'</div>'+
       '<div class="sm cav">'+esc(s.onchain_nav.trust_boundary)+'</div></div>';
  // attestation
  h += '<div class="srccard"><div class="st">온체인 attestation</div>'+
       '<div class="sd">'+esc(s.onchain_attestation.method)+'</div>'+
       '<div class="sm">대상: '+esc(s.onchain_attestation.target)+'</div></div>';
  // registry
  h += '<div class="srccard"><div class="st">레지스트리 주소</div>'+
       '<div class="sd">'+esc(s.registry_addresses.origin)+'</div>'+
       '<div class="sm">저장: <code>'+esc(s.registry_addresses.stored_in)+'</code></div>'+
       '<div class="sm">검증: '+esc(s.registry_addresses.verification)+'</div></div>';
  // offchain holdings
  for(const o of (s.offchain_holdings||[])){
    h += '<div class="srccard"><div class="st">오프체인 holdings · '+esc(o.oracle_id)+'</div>'+
         '<div class="sd">provider: '+esc(o.provider)+' ('+esc(o.type)+')</div>'+
         '<div class="sm">'+link(o.url)+'</div>'+
         '<div class="sm cav">'+esc(o.note)+'</div></div>';
  }
  // benchmark (yield + 국채)
  if(s.benchmark){
    const rf=s.benchmark.risk_free||{}, ty=s.benchmark.token_yield||{};
    h += '<div class="srccard"><div class="st">위험자유금리 (벤치마크)</div>'+
         '<div class="sd">'+esc(rf.provider||"")+'</div>'+
         '<div class="sm">'+link(rf.url)+'</div>'+
         '<div class="sm">'+esc(rf.note||"")+'</div></div>';
    h += '<div class="srccard"><div class="st">토큰 yield</div>'+
         '<div class="sd">'+esc(ty.description||"")+'</div>'+
         '<div class="sm">소스: Superstate API · Centrifuge GraphQL</div>'+
         '<div class="sm">설정: <code>'+esc(ty.config||"")+'</code></div></div>';
  }
  h += '</div>';
  h += '<div class="muted" style="margin-top:12px;font-size:12px">개별 자산의 정확한 컨트랙트 주소·holdings as_of는 밸류에이션 표의 <b>출처</b> 링크 및 <code>analysis.json</code>의 <code>assets[].source</code> 참조.</div>';
  body.innerHTML = h;
}

function renderKpis(d){
  const ig = d.integrity_gate || {};
  const lt = d.look_through || {};
  const kpis = [
    ["자산(오라클)", d.asset_count],
    ["look-through 시장가치", fmtUsd(lt.total_market_value)],
    ["무결성 OK", (ig.ok_count??0)+" / "+(d.asset_count??0)],
    ["플래그", (ig.flagged_count??0)],
  ];
  const wrap = $("#kpis"); wrap.innerHTML="";
  for(const [l,v] of kpis){
    const k = el("div","kpi");
    k.appendChild(el("div","v", esc(v)));
    k.appendChild(el("div","l", esc(l)));
    wrap.appendChild(k);
  }
}

function gradeBadge(g){ return '<span class="badge g-'+esc(g)+'">'+esc(g)+'</span>'; }

function renderValuation(d){
  const body = $("#p-valuation .body");
  const rows = (d.assets||[]).slice().sort((a,b)=>a.ticker.localeCompare(b.ticker));
  let h = '<div class="tablewrap"><table><thead><tr>'+
    '<th>자산</th><th>체인</th><th class="num">NAV</th><th>등급</th><th>freshness</th><th class="num">검증자</th><th>출처</th></tr></thead><tbody>';
  for(const a of rows){
    const nav = a.source && a.source.nav;
    const src = nav && nav.explorer
      ? '<a href="'+esc(nav.explorer)+'" target="_blank" rel="noopener" class="srclink" title="'+esc(nav.address)+'">'+esc((nav.address||"").slice(0,6))+'…↗</a>'
      : '<span class="muted">—</span>';
    h += '<tr><td><b>'+esc(a.ticker)+'</b></td><td class="muted">'+esc(a.chain)+'</td>'+
      '<td class="num">'+fmtNav(a.nav)+'</td>'+
      '<td>'+gradeBadge(a.trust_grade)+'</td>'+
      '<td class="fresh">'+esc(a.freshness)+'</td>'+
      '<td class="num">'+(a.attestation&&a.attestation.validator_count!=null ? (a.attestation.quorum+"/"+a.attestation.validator_count) : "—")+'</td>'+
      '<td>'+src+'</td></tr>';
  }
  h += '</tbody></table></div>';
  body.innerHTML = h;
}

function renderRisk(d){
  const body = $("#p-risk .body");
  const withH = (d.assets||[]).filter(a=>a.holdings_count>0);
  if(!withH.length){ body.innerHTML = '<div class="placeholder">holdings가 있는 자산이 없습니다.</div>'; }
  else {
    let h = "";
    for(const a of withH){
      h += '<div class="sect"><div class="h">'+esc(a.ticker)+' — holdings '+a.holdings_count+'건'+
           (a.holdings_as_of?' · as of '+esc(a.holdings_as_of):'')+'</div>';
      h += '<div class="wam">'+(a.wam_days!=null?Math.round(a.wam_days):"—")+'<small> 일 WAM</small></div>';
      const mb = a.maturity_buckets||{};
      const max = Math.max(1, ...Object.values(mb));
      h += '<div class="bars">';
      for(const [k,v] of Object.entries(mb)){
        h += '<div class="bar"><span>'+esc(k)+'</span><div class="track"><div class="fill" style="width:'+(v/max*100)+'%"></div></div><span class="pct">'+v.toFixed(1)+'%</span></div>';
      }
      h += '</div></div>';
    }
    body.innerHTML = h;
  }
  // look-through 합산
  const lt = d.look_through;
  if(lt){
    let s = '<div class="sect"><div class="h">look-through 합산 (전 오라클)</div>';
    s += '<div class="bars">';
    const byType = lt.by_instrument_type||{};
    const total = Math.max(1, lt.total_market_value||1);
    for(const [k,v] of Object.entries(byType)){
      s += '<div class="bar"><span>'+esc(k)+'</span><div class="track"><div class="fill" style="width:'+(v/total*100)+'%"></div></div><span class="pct">'+fmtUsd(v)+'</span></div>';
    }
    s += '</div><div class="muted" style="margin-top:6px;font-size:12px">'+lt.holdings_total+'건 · '+(lt.source_oracles||[]).length+'개 오라클 기여</div></div>';
    body.innerHTML += s;
  }
}

function renderIntegrity(d){
  const body = $("#p-integrity .body");
  const ig = d.integrity_gate||{};
  let h = "";
  const flagged = ig.flagged||[];
  const cross = ig.cross_chain_divergence||[];
  if(!flagged.length && !cross.length){
    h += '<div class="flag"><span class="dot" style="background:var(--a)"></span><span class="ok">모든 오라클 정상 — 위반 없음</span></div>';
  }
  for(const f of flagged){
    const crit = f.reason.includes("expired")||f.reason.includes("failed");
    h += '<div class="flag"><span class="dot" style="background:'+(crit?'var(--c)':'var(--b)')+'"></span>'+
         '<span><b>'+esc(f.oracle_id)+'</b> — '+esc(f.reason)+'</span></div>';
  }
  for(const c of cross){
    h += '<div class="flag"><span class="dot" style="background:var(--b)"></span>'+
         '<span><b>'+esc(c.ticker)+'</b> 교차체인 NAV 발산 '+esc(c.max_divergence_pct)+'%</span></div>';
  }
  // 교차체인 일관성 요약 (통과분)
  const ok = (d.cross_chain||[]).filter(c=>!c.flag);
  if(ok.length){
    h += '<div class="sect"><div class="h">교차체인 일관성 (통과)</div>';
    for(const c of ok){
      h += '<div class="flag"><span class="dot" style="background:var(--a)"></span><span class="muted">'+esc(c.ticker)+' · '+esc(c.chains.join("/"))+' · 발산 '+esc(c.max_divergence_pct)+'%</span></div>';
    }
    h += '</div>';
  }
  body.innerHTML = h;
}

function renderBenchmark(d){
  const body = $("#p-benchmark .body");
  const b = d.benchmark;
  if(!b || !b.spreads || !b.spreads.length){
    body.innerHTML = '<div class="placeholder">yield 소스가 있는 자산이 없습니다. <code>config/benchmarks.yaml</code>에 자산별 yield를 추가하세요.</div>';
    return;
  }
  const rf = b.risk_free_curve || {};
  const rates = rf.rates || {};
  let h = '<div class="sect"><div class="h">위험자유금리 · 미국채 (as of '+esc(rf.as_of||"")+')</div><div class="chips">';
  const label = {m1:"1개월",m3:"3개월",m6:"6개월",y1:"1년"};
  for(const k of ["m1","m3","m6","y1"]){
    if(rates[k]!=null) h += '<span class="chip">'+esc(label[k]||k)+' '+esc(rates[k])+'%</span>';
  }
  h += '</div></div>';
  const clsLabel = {treasury:"국채", clo:"CLO", credit:"크레딧", equity:"주식", unknown:"미확인"};
  h += '<div class="tablewrap" style="margin-top:10px"><table><thead><tr>'+
    '<th>자산</th><th>자산군</th><th class="num">토큰 yield</th><th class="num">국채</th><th class="num">스프레드</th><th>판정</th></tr></thead><tbody>';
  for(const s of b.spreads){
    const bps = s.spread_bps;
    // 크레딧/CLO는 양(+)=프리미엄(정상), 국채는 음(−)=비용. 색은 부호 기준.
    const cls = bps==null ? "" : (bps < -10 ? "sp-neg" : (bps > 10 ? "sp-pos" : "sp-mid"));
    const sign = bps>=0 ? "+" : "";
    const manualBadge = s.is_manual ? ' <span class="badge man" title="'+esc(s.yield_source||"")+' · as of '+esc(s.yield_as_of||"")+'">수동</span>' : '';
    h += '<tr><td><b>'+esc(s.ticker)+'</b></td>'+
      '<td><span class="chip">'+esc(clsLabel[s.asset_class]||s.asset_class)+'</span></td>'+
      '<td class="num">'+(s.token_yield_pct!=null?s.token_yield_pct.toFixed(2)+"%":"—")+manualBadge+'</td>'+
      '<td class="num muted">'+(s.benchmark_pct!=null?s.benchmark_pct+"% ("+esc(label[s.benchmark_tenor]||s.benchmark_tenor)+")":"—")+'</td>'+
      '<td class="num '+cls+'">'+(bps!=null?sign+bps+"bp":"—")+'</td>'+
      '<td class="fresh">'+esc(s.verdict||"")+'</td></tr>';
  }
  h += '</tbody></table></div>';
  h += '<div class="muted" style="margin-top:8px;font-size:12px">'+esc(b.note||"")+'</div>';
  body.innerHTML = h;
}

main();
</script>
</body>
</html>
