name: deploy-dashboard

# 대시보드(UI) 파일만 바뀐 push 시, 데이터 수집 없이 GitHub Pages만 재배포.
# 데이터(dashboard/analysis.json)는 daily 워크플로가 커밋해 둔 최신본을 그대로 사용.
#
# 주의: daily 워크플로의 자동 커밋은 메시지에 [skip ci]가 있어 이 워크플로를 트리거하지 않는다.
# 따라서 사람이 직접 dashboard/를 고쳐 push 할 때만 동작한다.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"

permissions:
  pages: write
  id-token: write
  contents: read

# daily의 Pages 배포와 동시 실행 방지 (같은 그룹)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
