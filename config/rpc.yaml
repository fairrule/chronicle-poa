# 무료 공용 RPC 엔드포인트 (명세 2.3)
# 체인별 배열 순서대로 fallback. 실패/타임아웃/rate-limit 시 다음 엔드포인트로.
# 전부 실패하면 해당 오라클을 이번 실행에서 스킵하고 에러 로그(다음 cron이 재시도).

rpc:
  ethereum:
    - "https://ethereum-rpc.publicnode.com"
    - "https://eth.llamarpc.com"
    - "https://eth.drpc.org"
    - "https://rpc.ankr.com/eth"

  base:
    - "https://base-rpc.publicnode.com"
    - "https://mainnet.base.org"
    - "https://base.llamarpc.com"
    - "https://base.drpc.org"

  # Monad — 2026-07 기준 테스트넷/메인넷 공용 엔드포인트.
  # verify_addresses 결과에 따라 조정.
  monad:
    - "https://rpc.monad.xyz"
    - "https://monad-rpc.publicnode.com"
    - "https://testnet-rpc.monad.xyz"

# freshness 판정 임계 (명세 4장, 시간 단위)
freshness:
  fresh_max_hours: 26
  stale_max_hours: 72
